<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital ID // Flowing Red Glowing Dots Divider</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'JetBrains Mono', monospace; background-color: #08080a; color: #cfcfd6; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 24px 16px; overflow: hidden; }
        .card-wrapper { position: relative; width: 100%; max-width: 380px; border-radius: 22px; padding: 2px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .card-wrapper::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(from 0deg, transparent 0%, transparent 75%, #ef4444 90%, #ff8888 95%, transparent 100%); animation: rotateGlow 4s linear infinite; }
        @keyframes rotateGlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .card { position: relative; width: 100%; background: #0f0f13; border-radius: 20px; padding: 28px 22px; z-index: 1; }
        
        .status-bar { display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; color: #6b6b7b; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; }
        
        /* Smooth, Slow, Endless Flowing Red Glowing Dots Line */
        .animated-divider {
            position: relative;
            width: 100%;
            height: 4px;
            background: #16161f;
            margin-bottom: 24px;
            overflow: hidden;
            border-radius: 2px;
        }

        .animated-divider::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 300%;
            height: 100%;
            background: radial-gradient(circle, #ffffff 1px, #ef4444 2px, transparent 3px);
            background-size: 25px 4px;
            animation: flowingDotsSlow 5s linear infinite;
        }

        @keyframes flowingDotsSlow {
            0% { transform: translateX(0); }
            100% { transform: translateX(25px); }
        }

        .status-dot { width: 6px; height: 6px; background-color: #22c55e; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #22c55e; animation: blinkDot 1.2s ease-in-out infinite; margin-right: 6px; }
        @keyframes blinkDot { 0%, 100% { opacity: 0.3; transform: scale(0.9); box-shadow: 0 0 4px #22c55e; } 50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 14px #22c55e; } }
        .profile-area { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
        .profile-left { display: flex; align-items: center; gap: 16px; }
        .avatar { width: 64px; height: 64px; border-radius: 12px; object-fit: cover; border: 1px solid #2a2a38; }
        .identity h1 { font-family: 'Instrument Serif', serif; font-size: 1.8rem; color: #f1f1f6; font-weight: 400; line-height: 1; margin-bottom: 4px; }
        .identity p { font-size: 0.75rem; color: #7c7c8c; }
        
        .logo-container { 
            width: 64px; 
            height: 64px; 
            position: relative;
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .spinning-logo {
            width: 52px;
            height: 52px;
            animation: trueCenterSpin 2.5s linear infinite;
        }

        .spinning-logo svg {
            width: 100%;
            height: 100%;
        }

        @keyframes trueCenterSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .widgets-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .widget-box { background: #14141a; border: 1px solid #1f1f2a; border-radius: 10px; padding: 10px 12px; text-align: left; }
        .widget-title { font-size: 0.6rem; color: #6b6b7b; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
        .widget-title i { color: #ef4444; }
        .widget-value { font-size: 0.82rem; color: #f1f1f6; font-weight: 500; }
        .greet-btn { width: 100%; background: #14141a; border: 1px solid #2a2a3c; color: #e4e4ed; padding: 12px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s ease; }
        .greet-btn i { color: #ef4444; }
        .greet-btn:hover { background: #1a1a24; border-color: #ef4444; color: #ffffff; }
        .links-stack { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
        .link-row { display: flex; align-items: center; justify-content: space-between; background: #14141a; border: 1px solid #1f1f2a; padding: 13px 16px; border-radius: 10px; color: #e4e4ed; text-decoration: none; font-size: 0.8rem; transition: all 0.2s ease; }
        .link-row span { display: flex; align-items: center; gap: 10px; }
        .link-row i { color: #ef4444; }
        .link-row .arrow { font-size: 0.7rem; color: #4a4a5c; transition: transform 0.2s; }
        .link-row:hover { background: #1a1a24; border-color: #ef4444; color: #ffffff; }
        .link-row:hover .arrow { transform: translateX(3px); color: #ef4444; }
        .footer-marquee { border-top: 1px solid #16161f; padding-top: 14px; overflow: hidden; white-space: nowrap; font-size: 0.72rem; color: #6b6b7b; text-transform: uppercase; letter-spacing: 0.08em; }
        .footer-marquee marquee { color: #ef4444; }
    </style>
</head>
<body>
    <div class="card-wrapper">
        <div class="card">
            <div class="status-bar">
                <span><span class="status-dot"></span><span id="status-text">online / ready</span></span>
                <span>ID // 001</span>
            </div>
            <div class="animated-divider"></div>
            <div class="profile-area">
                <div class="profile-left">
                    <img src="https://i.postimg.cc/gJDWJKWc/bean.jpg" alt="bean.jpg" class="avatar">
                    <div class="identity">
                        <h1>Bean</h1>
                        <p>@im.ashish.exe</p>
                    </div>
                </div>
                <div class="logo-container">
                    <div class="spinning-logo">
                        <svg viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="46" fill="#eab308" stroke="#000000" stroke-width="6"/>
                            <circle cx="50" cy="50" r="10" fill="#000000"/>
                            <path d="M50 50 L35 15 A42 42 0 0 1 65 15 Z" fill="#000000" transform="rotate(0 50 50)"/>
                            <path d="M50 50 L35 15 A42 42 0 0 1 65 15 Z" fill="#000000" transform="rotate(120 50 50)"/>
                            <path d="M50 50 L35 15 A42 42 0 0 1 65 15 Z" fill="#000000" transform="rotate(240 50 50)"/>
                            <circle cx="50" cy="50" r="6" fill="#eab308"/>
                        </svg>
                    </div>
                </div>
            </div>
            <div class="widgets-grid">
                <div class="widget-box">
                    <div class="widget-title"><i class="fa-regular fa-clock"></i> Local Time</div>
                    <div class="widget-value" id="live-clock">00:00:00</div>
                </div>
                <div class="widget-box">
                    <div class="widget-title"><i class="fa-solid fa-hourglass-half"></i> New Year In</div>
                    <div class="widget-value" id="countdown">--d</div>
                </div>
            </div>
            <button class="greet-btn" onclick="cycleGreeting()"><i class="fa-regular fa-comment-dots"></i> <span id="greet-btn-text">welcome friend</span></button>
            <div class="links-stack">
                <a href="https://uk.pinterest.com/ashishreji52/insta/" target="_blank" class="link-row">
                    <span><i class="fa-regular fa-eye"></i> visual archive.</span><i class="fa-solid fa-arrow-right arrow"></i>
                </a>
                <a href="https://github.com" target="_blank" class="link-row">
                    <span><i class="fa-solid fa-code"></i> code stash.</span><i class="fa-solid fa-arrow-right arrow"></i>
                </a>
                <a href="https://www.instagram.com/im.ashish.exe/" target="_blank" class="link-row">
                    <span><i class="fa-regular fa-paper-plane"></i> direct line.</span><i class="fa-solid fa-arrow-right arrow"></i>
                </a>
            </div>
            <div class="footer-marquee">
                <marquee direction="left" scrollamount="4">Killer Bean:"Just a bean trying to get some sleep." | "You've been decaffeinated."</marquee>
            </div>
        </div>
    </div>
    <script>
        function cycleGreeting() {
            document.getElementById('greet-btn-text').textContent = "glad you're here";
            document.getElementById('status-text').textContent = "online / glad you're here";
        }
        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        }
        setInterval(updateClock, 1000);
        updateClock();
        function updateCountdown() {
            const now = new Date();
            const target = new Date(`January 1, ${now.getFullYear() + 1} 00:00:00`);
            document.getElementById('countdown').textContent = `${Math.floor((target - now) / (1000 * 60 * 60 * 24))}d`;
        }
        setInterval(updateCountdown, 60000);
        updateCountdown();
    </script>
</body>
</html>
